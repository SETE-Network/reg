{% extends 'base.html' %}

{% block content %}

<h2>Upload</h2>
<form method="post" enctype="multipart/form-data">
{% csrf_token %}
<input type="file" name="document">
<button type="submit" >Upload CSV</button>
</form>

<button onclick="location.href='{% url 'script' %}'">Execute Script</button> <hr>
        {% if data %}
        
        {{data | safe}}

        {% endif %}


{% endblock %}
